<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>工艺与工序管理</title>
    <link rel="stylesheet" href="processManage.css">
</head>

<body>
    <div class="container">
        <div class="process-library">
            <div class="box-header">
                <h3 class="box-title">标准工序库</h3>
                <p class="explain">拖拽到右侧编辑区</p>
            </div>
            <ul class="box-body library-body">
            </ul>
        </div>
        <div class="process-list">
            <div class="box-header list-header">
                <h3 class="box-title">工艺列表</h3>
                <button class="btn-add">新建工艺</button>
            </div>
            <ul class="box-body list-body">
            </ul>
            <button class="btn-del">删除当前工艺</button>
        </div>
        <div class="process-panel">
            <div class="box-header panel-header">
                <h3 class="box-title panel-title">工艺：</h3>
                <div class="panel-btns">
                    <button class="btn-clear">清空工序</button>
                    <button class="btn-save">保存工艺</button>
                </div>
            </div>
            <ul class="box-body panel-body">
            </ul>
            <div class="panel-explain">将左侧工序拖放到此处</div>
        </div>
    </div>
    <script src="process.js"></script>
</body>

</html>
